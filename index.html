<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>世界之最：寰宇數據終端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Orbitron:wght@500;700;900&display=swap');
        
        :root {
            --cosmic-bg: radial-gradient(circle at 50% 50%, #0b1528 0%, #050b14 70%, #010307 100%);
            --cyber-cyan: #06b6d4;
            --cyber-gold: #fbbf24;
            --neon-border: linear-gradient(135deg, rgba(6, 182, 212, 0.4) 0%, rgba(124, 58, 237, 0.3) 50%, rgba(251, 191, 36, 0.2) 100%);
        }


        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background: var(--cosmic-bg);
            color: #f1f5f9; 
            overflow: hidden;
            overscroll-behavior: none;
            min-height: 100vh;
        }


        .tech-font {
            font-family: 'Orbitron', sans-serif;
        }


        /* 寰宇數據庫終端背景與邊線 */
        .cosmic-terminal {
            background: var(--cosmic-bg);
            position: relative;
        }


        .terminal-border {
            border: 4px solid #1e293b;
            box-shadow: inset 0 0 80px rgba(6, 182, 212, 0.15), 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
        }


        /* 光柵背景網格 */
        .grid-matrix {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 0;
        }


        /* 星光璀璨飄移粒子 */
        @keyframes starFloat {
            0% { transform: translateY(0) translateX(0) scale(0.8); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-100vh) translateX(50px) scale(1.2); opacity: 0; }
        }


        .star-dust { 
            animation: starFloat linear infinite; 
            position: absolute; 
            background: radial-gradient(circle, #fff 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            pointer-events: none; 
            z-index: 1;
        }


        /* 量子圓環 */
        @keyframes rotateRing {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .orbit-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px dashed rgba(6, 182, 212, 0.08);
            animation: rotateRing 40s linear infinite;
            pointer-events: none;
        }


        /* Glassmorphism Space Panel */
        .space-glass { 
            background: rgba(8, 15, 30, 0.75); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(6, 182, 212, 0.2); 
            box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.8), inset 0 0 15px rgba(6, 182, 212, 0.05); 
        }


        /* Tech Cyber Card Interactives */
        .cyber-card {
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
        }
        .cyber-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(6, 182, 212, 0.1), transparent);
            transform: translateX(-100%);
            transition: transform 0.8s ease;
        }
        .cyber-card:hover::before {
            transform: translateX(100%);
        }
        .cyber-card:hover { 
            transform: translateY(-3px); 
            border-color: rgba(6, 182, 212, 0.8);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
        }


        /* Custom Scrollbar */
        .timeline-container::-webkit-scrollbar { height: 8px; }
        .timeline-container::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.4); border-radius: 10px; }
        .timeline-container::-webkit-scrollbar-thumb { background: rgba(6, 182, 212, 0.3); border-radius: 10px; }
        .timeline-container::-webkit-scrollbar-thumb:hover { background: rgba(6, 182, 212, 0.6); }


        /* Metallic Medal Gradients for High-tech Look */
        .medal-cyan {
            background: linear-gradient(135deg, #22d3ee 0%, #0891b2 100%);
            box-shadow: 0 0 12px rgba(6, 182, 212, 0.4);
            color: #083344;
        }
        .medal-purple {
            background: linear-gradient(135deg, #c084fc 0%, #7c3aed 100%);
            box-shadow: 0 0 12px rgba(124, 58, 237, 0.4);
            color: #2e1065;
        }
        .medal-gold {
            background: linear-gradient(135deg, #fbbf24 0%, #b45309 100%);
            box-shadow: 0 0 12px rgba(251, 191, 36, 0.4);
            color: #451a03;
        }
        .medal-dim {
            background: rgba(30, 41, 59, 0.8);
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }


        .fade-in { animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeInUp { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }


        #volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 70px;
            height: 4px;
            border-radius: 2px;
            background: rgba(255,255,255,0.1);
            outline: none;
            cursor: pointer;
        }
        #volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #06b6d4;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(6, 182, 212, 0.8);
        }


        /* Sortable List Interaction */
        .sortable-item {
            touch-action: none; 
            user-select: none;
            transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.2s ease, border-color 0.2s;
        }
        .sortable-item.dragging {
            opacity: 0.8;
            box-shadow: 0 15px 25px rgba(6, 182, 212, 0.4);
            transform: scale(1.02);
            z-index: 50;
            border-color: #06b6d4 !important;
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col select-none text-slate-100">


    <!-- 全螢幕及音訊引導輔助 -->
    <div id="fs-helper" class="fixed inset-0 bg-slate-950/95 z-[110] flex flex-col items-center justify-center p-6 text-center transition-all duration-500">
        <div class="space-glass p-8 sm:p-12 rounded-3xl max-w-md border border-cyan-500/30">
            <i class="fas fa-satellite-dish text-6xl text-cyan-400 mb-6 animate-pulse"></i>
            <h2 class="text-3xl font-black mb-4 tech-font text-cyan-300">連線至寰宇數據庫</h2>
            <p class="text-slate-300 mb-8 text-sm leading-relaxed">我們即將載入量子數據對戰模式。為了呈現最完美的自適應滑動介面，建議您授權開啟最佳化連線模式。</p>
            <button onclick="requestStartGame()" class="bg-gradient-to-r from-cyan-600 to-indigo-600 hover:from-cyan-500 hover:to-indigo-500 text-white font-bold py-4 px-10 rounded-xl text-base shadow-lg transition-all hover:scale-105 active:scale-95 tech-font tracking-widest">
                初始化終端機
            </button>
        </div>
    </div>


    <!-- ================= UNIFIED TOP NAVIGATION BAR ================= -->
    <header id="game-header" class="hidden relative p-4 md:p-5 border-b border-cyan-500/10 bg-slate-950/80 backdrop-blur-md flex flex-col md:flex-row items-center justify-between gap-4 z-[60] absolute top-0 w-full h-auto md:h-[72px] shrink-0">
        
        <!-- Left Section: Back Home Button & Title Group -->
        <div class="flex items-center gap-4 w-full md:w-auto justify-between md:justify-start">
            <button id="btn-home" onclick="handleHomeClick()" class="bg-cyan-950/40 hover:bg-cyan-500/20 hover:text-cyan-300 text-slate-300 border border-cyan-500/20 px-3.5 py-1.5 rounded-full text-xs font-semibold tracking-wider uppercase transition-all flex items-center gap-1.5 shadow-sm">
                <i class="fas fa-sign-out-alt"></i> 斷開連線
            </button>
            <div class="text-left">
                <h1 class="text-lg md:text-xl font-extrabold tracking-wider bg-gradient-to-r from-cyan-400 via-indigo-300 to-cyan-500 bg-clip-text text-transparent flex items-center gap-2 drop-shadow-md tech-font">
                    <i class="fas fa-atom text-cyan-400"></i> COSMIC DATABASE
                </h1>
                <p class="text-cyan-400/40 text-[9px] tracking-widest uppercase mt-0.5 tech-font">World Records Terminal v4.2</p>
            </div>
        </div>


        <!-- Middle Section: Dynamic Mode info -->
        <div class="hidden md:flex items-center gap-3 bg-black/40 border border-cyan-500/10 px-4 py-1.5 rounded-full text-xs font-mono">
            <span class="text-cyan-400 font-bold tech-font" id="display-mode-name">DATABANK</span>
            <div class="h-3 w-[1px] bg-cyan-500/20"></div>
            <div class="text-slate-300 tech-font"><i class="fas fa-clock mr-1 text-cyan-400/80"></i><span id="game-timer">00:00</span></div>
        </div>


        <!-- Right Section: Volume Controller, Music Track Label, and Fullscreen Integrated Panel -->
        <div class="flex items-center gap-4 bg-slate-900/40 border border-cyan-500/10 rounded-full px-4 py-1.5 w-full md:w-auto justify-between md:justify-end">
            <!-- Audio Controller -->
            <div class="flex items-center gap-2">
                <button id="btn-mute" onclick="toggleMute()" title="靜音/取消靜音" class="text-cyan-400 hover:text-cyan-300 w-8 h-8 flex items-center justify-center rounded-full hover:bg-white/5 transition-all">
                    <i class="fas fa-volume-up text-sm" id="vol-icon"></i>
                </button>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5" oninput="setVolume(this.value)" class="w-16 md:w-20">
                <span id="music-label" class="text-[10px] text-cyan-300 font-bold tracking-wider uppercase ml-1 max-w-[80px] overflow-hidden text-ellipsis whitespace-nowrap tech-font">🎵 CYBER LOBBY</span>
            </div>
            
            <div class="h-4 w-[1px] bg-cyan-500/20"></div>


            <!-- Fullscreen Button -->
            <button id="btn-fullscreen" title="全螢幕" onclick="toggleFullscreen()" class="text-slate-300 hover:text-white hover:bg-white/5 w-8 h-8 flex items-center justify-center rounded-full transition-all">
                <i class="fas fa-expand text-sm" id="fs-icon"></i>
            </button>
        </div>
    </header>


    <!-- Toast Notification -->
    <div id="toast" class="fixed top-24 left-1/2 transform -translate-x-1/2 backdrop-blur-md px-6 py-3.5 rounded-full shadow-2xl transition-all duration-500 opacity-0 pointer-events-none z-50 text-center font-bold tracking-wide border text-sm">
        訊息
    </div>


    <!-- Main Container -->
    <div id="app" class="flex-1 w-full h-full relative"></div>


    <!-- 自定義防誤觸返回大廳對話框 -->
    <div id="confirm-modal" class="fixed inset-0 z-[120] bg-black/85 backdrop-blur-md hidden flex items-center justify-center p-6">
        <div class="space-glass p-6 sm:p-8 rounded-2xl max-w-sm w-full border border-red-500/30 shadow-2xl animate-scale-up text-center">
            <div class="w-16 h-16 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-red-500/20">
                <i class="fas fa-power-off text-3xl text-red-500"></i>
            </div>
            <h3 class="text-xl font-bold text-white mb-2 tech-font">TERMINATE CONNECTION?</h3>
            <p class="text-slate-400 text-sm mb-6 leading-relaxed">終止與量子終端的加密連線後，當前尚未校準的歷史與極限數據將會完全重置。</p>
            <div class="flex gap-3">
                <button onclick="closeConfirmModal()" class="flex-1 py-3 px-4 rounded-xl bg-slate-900 hover:bg-slate-800 border border-slate-700 text-slate-300 font-bold text-sm transition-colors">
                    繼續維持
                </button>
                <button onclick="confirmQuitGame()" class="flex-1 py-3 px-4 rounded-xl bg-gradient-to-r from-red-600 to-rose-700 hover:from-red-500 hover:to-rose-600 text-white font-bold text-sm shadow-lg transition-all">
                    斷開連線
                </button>
            </div>
        </div>
    </div>


    <!-- 排行榜 Modal -->
    <div id="leaderboard-modal" class="fixed inset-0 z-[130] bg-black/90 backdrop-blur-md hidden flex items-center justify-center p-4">
        <div class="space-glass p-6 rounded-3xl max-w-lg w-full border border-cyan-500/20 shadow-2xl relative">
            <button onclick="closeLeaderboardModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white w-8 h-8 flex items-center justify-center rounded-full hover:bg-white/10 transition-all">
                <i class="fas fa-times"></i>
            </button>
            <div class="flex items-center gap-3 mb-5 border-b border-cyan-500/10 pb-4">
                <i class="fas fa-trophy text-amber-400 text-xl"></i>
                <h2 class="text-xl font-black text-white tech-font tracking-widest">排行榜 LEADERBOARD</h2>
            </div>
            <!-- Tabs: Mode 2 & 3 only -->
            <div class="flex gap-2 mb-4">
                <button onclick="switchLbTab(2)" id="lb-tab-2" class="lb-tab flex-1 py-2 rounded-xl text-xs font-bold tech-font border border-cyan-400 bg-cyan-500/20 text-cyan-300 transition-all">模式二・滑動排序</button>
                <button onclick="switchLbTab(3)" id="lb-tab-3" class="lb-tab flex-1 py-2 rounded-xl text-xs font-bold tech-font border border-cyan-500/20 text-slate-400 hover:text-cyan-300 transition-all">模式三・派對接龍</button>
            </div>
            <div id="lb-modal-content" class="space-y-1.5 text-xs min-h-[120px]"></div>
            <button onclick="clearCurrentLbTab()" class="mt-4 text-[10px] text-slate-500 hover:text-rose-400 tech-font transition-colors">清除此排行榜</button>
        </div>
    </div>

    <script>
        let currentLbTab = 2;
        function openLeaderboardModal() {
            playSFX('click');
            currentLbTab = 2;
            renderLeaderboardModal();
            const modal = document.getElementById('leaderboard-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }
        function closeLeaderboardModal() {
            const modal = document.getElementById('leaderboard-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }
        function switchLbTab(n) {
            currentLbTab = n;
            renderLeaderboardModal();
        }
        function clearCurrentLbTab() {
            clearLeaderboard(currentLbTab);
        }
        function renderLeaderboardModal() {
            [2,3].forEach(n => {
                const tab = document.getElementById(`lb-tab-${n}`);
                if (!tab) return;
                if (n === currentLbTab) {
                    tab.className = 'lb-tab flex-1 py-2 rounded-xl text-xs font-bold tech-font border border-cyan-400 bg-cyan-500/20 text-cyan-300 transition-all';
                } else {
                    tab.className = 'lb-tab flex-1 py-2 rounded-xl text-xs font-bold tech-font border border-cyan-500/20 text-slate-400 hover:text-cyan-300 transition-all';
                }
            });
            const el = document.getElementById('lb-modal-content');
            if (!el) return;
            const lb = currentLbTab === 2 ? leaderboardM2 : leaderboardM3;
            if (lb.length === 0) {
                el.innerHTML = '<p class="text-slate-600 text-center py-6 tech-font">尚無紀錄</p>';
                return;
            }
            const label = currentLbTab === 2 ? '關' : '分';
            const countLabel = currentLbTab === 2 ? '次' : '局';
            el.innerHTML = lb.map((e,i) => `
                <div class="flex items-center gap-2 px-3 py-2 rounded-lg ${i===0?'bg-amber-500/10 border border-amber-500/20':'bg-slate-900/30'}">
                    <span class="text-sm w-5 text-center ${i===0?'text-amber-400':i===1?'text-slate-300':i===2?'text-amber-700/80':'text-slate-600'} font-bold">${i+1}</span>
                    <span class="text-cyan-300 font-bold tech-font">${e.score}${label}</span>
                    <span class="text-slate-500">/ ${e.count}${countLabel}</span>
                    <span class="ml-auto text-emerald-400 tech-font">${e.acc}%</span>
                    <span class="text-slate-600 text-[10px]">${e.date}</span>
                </div>
            `).join('');
        }
    </script>

        // ==========================================
        // 2. AUDIO SYSTEM & SMART FALLBACK

        const AudioSystem = {
            ctx: null, 
            masterGain: null, 
            isMuted: true, 
            volume: 0.5,
            currentTrack: null, 
            bgmSequence: null,


            lobbyAudio: null,
            gameAudio: null,


            // 科幻、太空 Ambient 氛圍的 Web Audio 備援合成音色
            fallbackLobbyScale: [293.66, 329.63, 392.00, 440.00, 587.33], // D 懸浮音階
            fallbackLobbyPattern: [0, 2, 1, 3, 2, 4, -1, 3, 1, 2, -1],
            fallbackLobbyTempo: 50,
            lobbyNoteIdx: 0,
            lobbyNextTime: 0,


            fallbackGameScale: [146.83, 220.00, 293.66, 329.63, 392.00, 440.00], // 速度感低頻極速脈衝
            fallbackGamePattern: [0, 1, 2, 1, 3, 2, 4, 3, 5, 4, 2, -1],
            fallbackGameTempo: 130,
            gameNoteIdx: 0,
            gameNextTime: 0,


            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    this.masterGain = this.ctx.createGain();
                    this.masterGain.gain.setValueAtTime(this.isMuted ? 0 : this.volume, this.ctx.currentTime);
                    this.masterGain.connect(this.ctx.destination);
                }
                
                if (!this.lobbyAudio) {
                    this.lobbyAudio = new Audio('lobby.mp3');
                    this.lobbyAudio.loop = true;
                    this.lobbyAudio.volume = this.volume;
                    this.lobbyAudio.load();
                }
                if (!this.gameAudio) {
                    this.gameAudio = new Audio('battle.mp3');
                    this.gameAudio.loop = true;
                    this.gameAudio.volume = this.volume;
                    this.gameAudio.load();
                }
            },


            toggle() {
                this.init();
                if (this.ctx.state === 'suspended') this.ctx.resume();
                this.isMuted = !this.isMuted;
                
                const volIcon = document.getElementById('vol-icon');
                if (volIcon) {
                    volIcon.className = this.isMuted ? 'fas fa-volume-mute' : 'fas fa-volume-up';
                }


                if (this.isMuted) {
                    this.stopAllAudio();
                } else {
                    this.playSFX('click');
                    this.play(this.currentTrack || 'lobby');
                }
            },


            play(trackType) {
                this.init();
                if (this.ctx.state === 'suspended') this.ctx.resume();


                this.stopAllAudio();
                this.currentTrack = trackType;


                const musicLabel = document.getElementById('music-label');
                if (musicLabel) {
                    musicLabel.textContent = trackType === 'lobby' ? '🎵 CYBER LOBBY' : '🎮 QUANTUM BATTLE';
                }


                if (this.isMuted) return;


                const activeAudio = trackType === 'lobby' ? this.lobbyAudio : this.gameAudio;
                
                if (activeAudio) {
                    activeAudio.volume = this.volume;
                    const playPromise = activeAudio.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(() => {
                            this.startSynthesizedBGM(trackType);
                        });
                    }
                } else {
                    this.startSynthesizedBGM(trackType);
                }
            },


            startSynthesizedBGM(trackType) {
                if (this.bgmSequence) {
                    cancelAnimationFrame(this.bgmSequence);
                    this.bgmSequence = null;
                }


                if (trackType === 'lobby') {
                    this.lobbyNextTime = this.ctx.currentTime + 0.1;
                    this.lobbyNoteIdx = 0;
                    this.scheduleLobbySynthLoop();
                } else {
                    this.gameNextTime = this.ctx.currentTime + 0.1;
                    this.gameNoteIdx = 0;
                    this.scheduleGameSynthLoop();
                }
            },


            scheduleLobbySynthLoop() {
                if (this.currentTrack !== 'lobby' || this.isMuted) return;
                while (this.lobbyNextTime < this.ctx.currentTime + 0.1) {
                    let n = this.fallbackLobbyPattern[this.lobbyNoteIdx];
                    if (n !== -1) {
                        const freq = this.fallbackLobbyScale[n];
                        this.synthesizeSoftNote(freq, this.lobbyNextTime, 0.08, 'sine', 1.8);
                    }
                    this.lobbyNextTime += 60.0 / this.fallbackLobbyTempo;
                    this.lobbyNoteIdx = (this.lobbyNoteIdx + 1) % this.fallbackLobbyPattern.length;
                }
                this.bgmSequence = requestAnimationFrame(() => this.scheduleLobbySynthLoop());
            },


            scheduleGameSynthLoop() {
                if (this.currentTrack !== 'game' || this.isMuted) return;
                while (this.gameNextTime < this.ctx.currentTime + 0.1) {
                    let n = this.fallbackGamePattern[this.gameNoteIdx];
                    if (n !== -1) {
                        const freq = this.fallbackGameScale[n];
                        this.synthesizeSoftNote(freq, this.gameNextTime, 0.03, 'sawtooth', 0.4);
                        
                        if (this.gameNoteIdx % 4 === 0) {
                            this.synthesizeSoftNote(73.42, this.gameNextTime, 0.15, 'triangle', 0.3); // 重低音脈衝
                        }
                    }
                    this.gameNextTime += 60.0 / this.fallbackGameTempo;
                    this.gameNoteIdx = (this.gameNoteIdx + 1) % this.fallbackGamePattern.length;
                }
                this.bgmSequence = requestAnimationFrame(() => this.scheduleGameSynthLoop());
            },


            synthesizeSoftNote(freq, startTime, duration, type='sine', decay=1.0) {
                if (this.isMuted || !this.ctx) return;
                try {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, startTime);
                    gain.gain.setValueAtTime(0, startTime);
                    gain.gain.linearRampToValueAtTime(duration, startTime + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, startTime + decay);
                    osc.connect(gain);
                    gain.connect(this.masterGain);
                    osc.start(startTime);
                    osc.stop(startTime + decay + 0.1);
                } catch(e) {}
            },


            stopAllAudio() {
                if (this.bgmSequence) {
                    cancelAnimationFrame(this.bgmSequence);
                    this.bgmSequence = null;
                }
                if (this.lobbyAudio) {
                    try { this.lobbyAudio.pause(); this.lobbyAudio.currentTime = 0; } catch(e){}
                }
                if (this.gameAudio) {
                    try { this.gameAudio.pause(); this.gameAudio.currentTime = 0; } catch(e){}
                }
            },


            setVolume(v) {
                this.volume = parseFloat(v);
                if (this.masterGain) {
                    this.masterGain.gain.setValueAtTime(this.isMuted ? 0 : this.volume, this.ctx.currentTime);
                }
                if (this.lobbyAudio) this.lobbyAudio.volume = this.volume;
                if (this.gameAudio) this.gameAudio.volume = this.volume;
                
                const icon = document.getElementById('vol-icon');
                if (icon) {
                    if (this.isMuted || this.volume === 0) {
                        icon.className = 'fas fa-volume-mute';
                    } else if (this.volume < 0.4) {
                        icon.className = 'fas fa-volume-down';
                    } else {
                        icon.className = 'fas fa-volume-up';
                    }
                }
            }
        };


        function playSFX(type) {
            try {
                AudioSystem.init();
                const c = AudioSystem.ctx;
                if (c.state === 'suspended') c.resume();
                const gain = c.createGain();
                gain.connect(AudioSystem.masterGain || c.destination);
                const t = c.currentTime;


                if (type === 'correct') {
                    [[587.33, 0, 0.08], [880.00, 0.06, 0.08], [1174.66, 0.12, 0.15]].forEach(([f, s, d]) => {
                        const o = c.createOscillator();
                        const g = c.createGain();
                        o.type = 'sine';
                        o.frequency.value = f;
                        g.gain.setValueAtTime(0.15, t + s);
                        g.gain.linearRampToValueAtTime(0, t + s + d);
                        o.connect(g); g.connect(gain);
                        o.start(t + s);
                        o.stop(t + s + d + 0.05);
                    });
                } else if (type === 'wrong') {
                    [[180, 0, 0.12], [120, 0.08, 0.18]].forEach(([f, s, d]) => {
                        const o = c.createOscillator();
                        const g = c.createGain();
                        o.type = 'triangle';
                        o.frequency.value = f;
                        g.gain.setValueAtTime(0.2, t + s);
                        g.gain.linearRampToValueAtTime(0, t + s + d);
                        o.connect(g); g.connect(gain);
                        o.start(t + s);
                        o.stop(t + s + d + 0.05);
                    });
                } else if (type === 'click') {
                    const o = c.createOscillator();
                    const g = c.createGain();
                    o.type = 'sine';
                    o.frequency.value = 1046.50;
                    g.gain.setValueAtTime(0.05, t);
                    g.gain.linearRampToValueAtTime(0, t + 0.04);
                    o.connect(g); g.connect(gain);
                    o.start(t);
                    o.stop(t + 0.06);
                } else if (type === 'win') {
                    [[293.66,0,0.1],[392.00,0.1,0.1],[587.33,0.2,0.1],[880.00,0.3,0.15], [1174.66,0.45,0.3]].forEach(([f,s,d]) => {
                        const o = c.createOscillator();
                        const g = c.createGain();
                        o.type = 'sine';
                        o.frequency.value = f;
                        g.gain.setValueAtTime(0.18, t + s);
                        g.gain.linearRampToValueAtTime(0, t + s + d);
                        o.connect(g); g.connect(gain);
                        o.start(t + s);
                        o.stop(t + s + d + 0.05);
                    });
                }
            } catch(e) {}
        }


        function setVolume(v) { AudioSystem.setVolume(v); }

        function saveLeaderboard(mode, score, count) {
            const entry = { score, count, acc: count > 0 ? Math.round(score/count*100) : 0, date: new Date().toLocaleDateString('zh-TW') };

        function initPointerDrag(element, container) {
            element.addEventListener('pointerdown', (e) => {
                if (e.target.tagName.toLowerCase() === 'a' || e.target.closest('a')) return;
                e.preventDefault();
                element.setPointerCapture(e.pointerId);
                playSFX('click');

                // --- Setup: measure element and create placeholder ---
                const rect = element.getBoundingClientRect();
                const offsetY = e.clientY - rect.top; // cursor offset within element

                // Placeholder keeps the space while dragging
                const placeholder = document.createElement('div');
                placeholder.style.height = rect.height + 'px';
                placeholder.style.margin = window.getComputedStyle(element).margin;
                placeholder.style.borderRadius = '12px';
                placeholder.style.background = 'rgba(6,182,212,0.07)';
                placeholder.style.border = '2px dashed rgba(6,182,212,0.3)';
                placeholder.style.boxSizing = 'border-box';
                placeholder.style.flexShrink = '0';

                // Detach element, insert placeholder
                const parent = element.parentNode;
                parent.insertBefore(placeholder, element);
                document.body.appendChild(element);

                // Fix element to cursor position
                element.style.position = 'fixed';
                element.style.zIndex = '9999';
                element.style.width = rect.width + 'px';
                element.style.left = rect.left + 'px';
                element.style.top = (e.clientY - offsetY) + 'px';
                element.style.margin = '0';
                element.style.transform = 'scale(1.03)';
                element.style.boxShadow = '0 15px 30px rgba(6,182,212,0.35)';
                element.style.borderColor = '#06b6d4';
                element.style.transition = 'box-shadow 0.15s, transform 0.15s';
                element.style.pointerEvents = 'none';

                function onPointerMove(moveEvent) {
                    element.style.top = (moveEvent.clientY - offsetY) + 'px';

                    // Find best insertion point using placeholder siblings
                    const siblings = Array.from(parent.children).filter(c => c !== placeholder);
                    const cursorY = moveEvent.clientY;
                    let inserted = false;
                    for (let i = 0; i < siblings.length; i++) {
                        const sibRect = siblings[i].getBoundingClientRect();
                        if (cursorY < sibRect.top + sibRect.height / 2) {
                            parent.insertBefore(placeholder, siblings[i]);
                            inserted = true;
                            break;
                        }
                    }
                    if (!inserted) parent.appendChild(placeholder);
                }

                function onPointerUp() {
                    element.removeEventListener('pointermove', onPointerMove);
                    element.removeEventListener('pointerup', onPointerUp);
                    element.removeEventListener('pointercancel', onPointerUp);

                    // Restore element styles
                    element.style.position = '';
                    element.style.zIndex = '';
                    element.style.width = '';
                    element.style.left = '';
                    element.style.top = '';
                    element.style.margin = '';
                    element.style.transform = '';
                    element.style.boxShadow = '';
                    element.style.borderColor = '';
                    element.style.transition = '';
                    element.style.pointerEvents = '';

                    // Insert element where placeholder is, then remove placeholder
                    parent.insertBefore(element, placeholder);
                    placeholder.remove();

                    // Rebuild gameState.m2SelectedItems to match new DOM order
                    const newOrder = Array.from(parent.children).map(card => card._itemRef).filter(Boolean);
                    if (newOrder.length === gameState.m2SelectedItems.length) {
                        gameState.m2SelectedItems = newOrder;
                    }

                    // Re-render medals and indices
                    Array.from(parent.children).forEach((card, idx) => {
                        card.dataset.index = idx;
                        const medal = card.querySelector('.drag-medal');
                        if (!medal) return;
                        medal.textContent = idx + 1;
                        medal.className = `drag-medal font-bold text-xs w-6 h-6 flex items-center justify-center rounded-lg ${idx===0?'medal-gold':idx===1?'medal-cyan':idx===2?'medal-purple':'medal-dim'} mr-3 flex-shrink-0 tech-font`;
                    });
                }

                element.addEventListener('pointermove', onPointerMove);
                element.addEventListener('pointerup', onPointerUp);
                element.addEventListener('pointercancel', onPointerUp);
            });
        }


        function checkMode2Answer() {

        function startMode3() {
            gameState.mode = 3;
            gameState.m3Scores = new Array(gameState.m3Players).fill(0);
            gameState.m3Round = 1;
            gameState.m3CurrentPlayer = 0; 
            
            setScreen('play_m3');
            startTimer();
            AudioSystem.play('game');
            startM3Round();
        }


        function startM3Round() {
            if (gameState.m3Round > gameState.m3RoundsTotal) {
                endM3Game();
                return;
            }


            gameState.m3CatData = DATABASE[Math.floor(Math.random() * DATABASE.length)];
            let items = gameState.m3CatData.items.map((item, idx) => ({...item, originalRank: idx}));
            gameState.m3UnplacedItems = shuffle([...items]);
            gameState.m3Board = [gameState.m3UnplacedItems.pop()];
            gameState.m3CurrentCard = gameState.m3UnplacedItems.pop();


            updateM3UI();
        }


        function updateM3UI() {
            const rd = document.getElementById('m3-round-display');
            if(rd) rd.textContent = `${gameState.m3Round}/${gameState.m3RoundsTotal}`;
            
            const turnIndicator = document.getElementById('m3-player-turn');
            if (turnIndicator) {
                turnIndicator.textContent = `⚡ 玩家 P${gameState.m3CurrentPlayer + 1} 決策核心`;
                turnIndicator.className = `text-sm md:text-base font-bold text-white px-5 py-2.5 rounded-2xl shadow-lg border-2 ${m3BorderColors[gameState.m3CurrentPlayer]} ${m3Colors[gameState.m3CurrentPlayer]}/20 text-glow-cyan flex items-center justify-center gap-2 tech-font`;
            }


            const sb = document.getElementById('m3-scoreboard');
            if (sb) {
                sb.innerHTML = '';
                for(let i=0; i<gameState.m3Players; i++) {
                    const isTurn = i === gameState.m3CurrentPlayer;
                    sb.innerHTML += `
                        <div class="px-5 py-3 rounded-2xl border-2 ${isTurn ? m3BorderColors[i] + ' bg-slate-950/80 shadow-md scale-105' : 'border-transparent bg-slate-900/20 opacity-50'} flex flex-col items-center min-w-[75px] transition-all duration-300">

                            <span class="text-2xl font-black ${m3TextColors[i]} tech-font">${gameState.m3Scores[i]}</span>
                        </div>
                    `;
                }
            }


            const catLabel = document.getElementById('m3-category');
            if(catLabel) catLabel.textContent = `${gameState.m3CatData.cat} (${gameState.m3CatData.unit})`;
            const currentCardLabel = document.getElementById('m3-current-card-name');
            if(currentCardLabel) currentCardLabel.textContent = gameState.m3CurrentCard.n;


            renderM3Timeline();
        }


        function renderM3Timeline() {
            const tl = document.getElementById('m3-timeline');
            if(!tl) return;
            tl.innerHTML = '';


            for (let i = 0; i <= gameState.m3Board.length; i++) {
                const btn = document.createElement('button');
                btn.className = 'w-10 h-10 md:w-11 md:h-11 rounded-full border-2 border-dashed border-cyan-500/40 text-cyan-400 flex-shrink-0 flex items-center justify-center hover:bg-cyan-500/20 hover:border-solid hover:scale-110 active:scale-95 transition-all mx-1.5 z-10 bg-slate-950 shadow-md pointer-events-auto';
                btn.innerHTML = '<i class="fas fa-plus text-xs animate-pulse"></i>';
                btn.onclick = () => attemptM3Placement(i);
                tl.appendChild(btn);


                if (i < gameState.m3Board.length) {
                    const cardData = gameState.m3Board[i];
                    const card = document.createElement('div');
                    card.className = 'w-32 md:w-36 bg-slate-950/80 border border-cyan-500/20 rounded-2xl shadow-xl p-3.5 flex-shrink-0 flex flex-col items-center justify-center relative mx-1.5 border-t-2 border-t-cyan-400';
                    
                    card.innerHTML = `
                        <div class="text-[9px] text-slate-500 font-bold mb-1.5 absolute top-1.5 left-2.5 tech-font">NODE #${cardData.originalRank + 1}</div>

                        <span class="text-xs font-semibold text-cyan-400 tech-font">${cardData.v}</span>
                        <a href="${cardData.w}" target="_blank" class="text-[10px] text-yellow-400 hover:underline mt-1"><i class="fas fa-external-link-alt"></i> 維基百科</a>

                    tl.appendChild(card);
                }
            }
        }


        function attemptM3Placement(insertIndex) {
            let isCorrect = true;
            
            if (insertIndex > 0) {
                const leftCard = gameState.m3Board[insertIndex - 1];
                if (gameState.m3CurrentCard.originalRank < leftCard.originalRank) {
                    isCorrect = false; 
                }
            }
            
            if (insertIndex < gameState.m3Board.length) {
                const rightCard = gameState.m3Board[insertIndex];
                if (gameState.m3CurrentCard.originalRank > rightCard.originalRank) {
                    isCorrect = false; 
                }
            }

            if (isCorrect) {
                gameState.m3Scores[gameState.m3CurrentPlayer] += 1;
                gameState.m3Board.splice(insertIndex, 0, gameState.m3CurrentCard);
                
                if (gameState.m3UnplacedItems.length > 0) {
                    gameState.m3CurrentPlayer = (gameState.m3CurrentPlayer + 1) % gameState.m3Players;
                    gameState.m3CurrentCard = gameState.m3UnplacedItems.pop();
                    updateM3UI();
                    showToast("量子鏈接成功！分值躍遷 +1");
                    playSFX('correct');
                } else {
                    // All cards placed — round complete
                    playSFX('win');
                    showM3RoundEndModal(true);
                }
            } else {
                playSFX('wrong');
                // Wrong: discard card, next player picks new card (if any) or round ends
                showM3WrongModal();
            }
        }

        function showM3WrongModal() {
            const modal = document.getElementById('m3-modal');
            const icon = document.getElementById('m3-modal-icon');
            icon.innerHTML = '<i class="fas fa-radiation-alt text-rose-500 animate-spin"></i>';
            document.getElementById('m3-modal-title').textContent = `P${gameState.m3CurrentPlayer + 1} 鏈接失敗`;
            document.getElementById('m3-modal-title').className = "text-2xl font-black mb-2 text-rose-500 tech-font";
            document.getElementById('m3-modal-desc').innerHTML = `量子順序發生崩塌！<br><span class="font-bold text-rose-400">『${gameState.m3CurrentCard.n}』</span> 真實排名應為第 ${gameState.m3CurrentCard.originalRank + 1} 名，其數據為 ${gameState.m3CurrentCard.v}。`;
            
            const detail = document.getElementById('m3-modal-detail');
            detail.classList.remove('hidden');
            let detailHtml = '<div class="font-bold mb-2 text-slate-400 tech-font"><i class="fas fa-list-ol mr-1"></i> 標準終端數據順序：</div><ol class="list-decimal pl-5 space-y-1 tech-font text-xs">';
            gameState.m3CatData.items.forEach((it, idx) => {
                detailHtml += `<li class="${it.n === gameState.m3CurrentCard.n ? 'text-rose-400 font-bold' : 'text-slate-300'}"><a href="${it.w}" target="_blank" class="hover:underline">${it.n}</a> : <span class="font-semibold">${it.v} ${gameState.m3CatData.unit}</span></li>`;
            });
            detailHtml += '</ol>';
            detail.innerHTML = detailHtml;

            const btn = modal.querySelector('button');
            btn.textContent = gameState.m3UnplacedItems.length > 0 ? "繼續此局" : "前進下個星區";
            btn.onclick = () => {
                modal.classList.add('hidden');
                detail.classList.add('hidden');
                btn.onclick = m3NextRound;
                btn.textContent = "前進下個星區";
                if (gameState.m3UnplacedItems.length > 0) {
                    // Continue this round: next player, next card
                    gameState.m3CurrentPlayer = (gameState.m3CurrentPlayer + 1) % gameState.m3Players;
                    gameState.m3CurrentCard = gameState.m3UnplacedItems.pop();
                    updateM3UI();
                } else {
                    // No more cards — end this round
                    gameState.m3Round++;
                    startM3Round();
                }
            };
            modal.classList.remove('hidden');
        }

        function showM3RoundEndModal(isAllPlaced) {
            const modal = document.getElementById('m3-modal');
            const icon = document.getElementById('m3-modal-icon');
            icon.innerHTML = '<i class="fas fa-satellite text-cyan-400"></i>';
            document.getElementById('m3-modal-title').textContent = "星軌拓撲重塑完成";
            document.getElementById('m3-modal-title').className = "text-2xl font-black mb-2 text-cyan-300 tech-font";
            document.getElementById('m3-modal-desc').innerHTML = `所有數據均已被安全插入當前時空線！P${gameState.m3CurrentPlayer + 1} 成功校對最後一項節點！`;
            document.getElementById('m3-modal-detail').classList.add('hidden');
            
            const btn = modal.querySelector('button');
            btn.textContent = "前進下個星區";
            btn.onclick = m3NextRound;
            modal.classList.remove('hidden');
        }

        function m3NextRound() {
            document.getElementById('m3-modal').classList.add('hidden');
            document.getElementById('m3-modal-detail').classList.add('hidden');
            gameState.m3Round++;
            startM3Round();
        }


        function endM3Game() {
            const modal = document.getElementById('m3-modal');
            const icon = document.getElementById('m3-modal-icon');
            
            playSFX('win');
            AudioSystem.play('lobby'); 
            
            // Save M3 leaderboard: winner's score
            let maxScore = -1;
            let winners = [];
            gameState.m3Scores.forEach((s, i) => {
                if (s > maxScore) { maxScore = s; winners = [i+1]; }
                else if (s === maxScore) { winners.push(i+1); }
            });
            saveLeaderboard(3, maxScore, gameState.m3RoundsTotal);

            icon.innerHTML = '<i class="fas fa-crown text-amber-400"></i>';
            document.getElementById('m3-modal-title').textContent = "終端競賽統計結束！";
            document.getElementById('m3-modal-title').className = "text-2xl font-black mb-2 text-amber-400 tech-font";
            
            let resultHtml = `<div class="text-xl font-bold text-white mb-5 tech-font">👑 優勝控制核心: 玩家 P${winners.join(', ')} 👑</div>`;
            resultHtml += `<div class="flex justify-center gap-4 border-t border-cyan-500/10 pt-4">`;
            gameState.m3Scores.forEach((s, i) => {
                resultHtml += `
                    <div class="text-center bg-slate-900/40 border border-cyan-500/10 p-3 rounded-xl min-w-[70px]">
                        <div class="font-bold text-xs text-slate-400 tech-font">CORE P${i+1}</div>
                        <div class="text-xl font-black ${m3TextColors[i]} mt-0.5 tech-font">${s}</div>
                    </div>
                `;
            });
            resultHtml += `</div>`;
            
            document.getElementById('m3-modal-desc').innerHTML = resultHtml;
            document.getElementById('m3-modal-detail').classList.add('hidden');
            
            const btn = modal.querySelector('button');
            btn.textContent = "釋放連線回終端大廳";
            btn.onclick = () => {
                modal.classList.add('hidden');
                btn.onclick = m3NextRound; 
                btn.textContent = "前進下個星區";
                stopTimer();
                gameState.screen = 'menu';
                document.getElementById('game-header').classList.add('hidden');
                render();
            };
            modal.classList.remove('hidden');
        }

        function renderEncyclopedia() {
            const container = document.getElementById('encyclopedia-list');
            if (!container) return;

            container.innerHTML = '';

            const filtered = DATABASE.filter(catObj => {
                if (!encyclopediaFilter) return true;
                const q = encyclopediaFilter;
                if (catObj.cat.toLowerCase().includes(q)) return true;
                if (catObj.unit.toLowerCase().includes(q)) return true;
                if (catObj.items.some(it => it.n.toLowerCase().includes(q))) return true;
                return false;
            });
