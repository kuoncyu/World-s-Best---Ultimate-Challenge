<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界之最 終極挑戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0fdf4; color: #1f2937; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Mode 3 Timeline Scrollbar */
        .timeline-container::-webkit-scrollbar { height: 8px; }
        .timeline-container::-webkit-scrollbar-track { background: #e5e7eb; border-radius: 4px; }
        .timeline-container::-webkit-scrollbar-thumb { background: #10b981; border-radius: 4px; }
        
        .rank-medal-0 { color: #fbbf24; } /* Gold */
        .rank-medal-1 { color: #9ca3af; } /* Silver */
        .rank-medal-2 { color: #b45309; } /* Bronze */

        /* Audio Controls */
        #audio-controls {
            position: fixed;
            bottom: 18px;
            right: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.92);
            border-radius: 999px;
            padding: 8px 14px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.18);
            z-index: 1000;
            backdrop-filter: blur(8px);
            transition: all 0.3s;
        }
        #audio-controls button {
            background: none;
            border: none;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        #audio-controls button:hover { background: rgba(255,255,255,0.2); }
        #volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 80px;
            height: 4px;
            border-radius: 2px;
            background: rgba(255,255,255,0.4);
            outline: none;
            cursor: pointer;
        }
        #volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            box-shadow: 0 0 4px rgba(0,0,0,0.3);
        }
        #volume-slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            border: none;
        }
        #music-label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.85);
            font-weight: bold;
            white-space: nowrap;
            max-width: 90px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .audio-pulse {
            animation: audioPulse 1.5s ease-in-out infinite;
        }
        @keyframes audioPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Fullscreen button */
        #btn-fullscreen {
            position: fixed;
            bottom: 18px;
            left: 18px;
            background: rgba(55, 65, 81, 0.85);
            color: white;
            border: none;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 4px 14px rgba(0,0,0,0.2);
            backdrop-filter: blur(6px);
            transition: background 0.2s, transform 0.15s;
        }
        #btn-fullscreen:hover { background: rgba(55,65,81,1); transform: scale(1.08); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">


    <!-- Fullscreen Button -->
    <button id="btn-fullscreen" title="全螢幕" onclick="toggleFullscreen()">
        <i class="fas fa-expand" id="fs-icon"></i>
    </button>

    <!-- Audio Controls -->
    <div id="audio-controls">
        <button id="btn-mute" onclick="toggleMute()" title="靜音/取消靜音">
            <i class="fas fa-volume-up" id="vol-icon"></i>
        </button>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5" oninput="setVolume(this.value)">
        <span id="music-label" class="audio-pulse">🎵 大廳音樂</span>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg transition-opacity duration-300 opacity-0 pointer-events-none z-50 text-center font-bold">
        Message
    </div>


    <!-- Main Container -->
    <div class="glass-panel w-full max-w-4xl min-h-[600px] flex flex-col relative overflow-hidden">
        
        <!-- Header -->
        <header class="bg-emerald-600 text-white p-4 text-center rounded-t-2xl relative shadow-md">
            <button id="btn-home" class="absolute left-4 top-1/2 transform -translate-y-1/2 hover:text-emerald-200 hidden transition-colors text-xl">
                <i class="fas fa-home"></i> 回主選單
            </button>
            <h1 class="text-2xl md:text-3xl font-black tracking-widest"><i class="fas fa-globe-americas mr-2"></i>世界之最</h1>
            <p class="text-emerald-100 text-sm mt-1">挑戰你的極限常識</p>
        </header>


        <!-- Main Content Area -->
        <main class="flex-grow p-4 md:p-8 flex flex-col relative">


            <!-- ================= VIEW: MAIN MENU ================= -->
            <div id="view-menu" class="flex-grow flex flex-col items-center justify-center space-y-4 fade-in">
                <h2 class="text-xl text-gray-600 font-bold mb-6">請選擇遊戲模式</h2>
                
                <button onclick="startGame(1)" class="w-full md:w-2/3 lg:w-1/2 p-4 bg-white border-2 border-emerald-500 rounded-xl card-hover flex items-center transition-all hover:bg-emerald-50 group">
                    <div class="bg-emerald-100 text-emerald-600 w-12 h-12 rounded-full flex items-center justify-center text-2xl mr-4 group-hover:bg-emerald-500 group-hover:text-white transition-colors">
                        <i class="fas fa-mouse-pointer"></i>
                    </div>
                    <div class="text-left">
                        <h3 class="text-lg font-bold text-gray-800">第一模式：直覺單選</h3>
                        <p class="text-sm text-gray-500">四選一，找出真正的世界第一。</p>
                    </div>
                </button>


                <button onclick="showMode2Setup()" class="w-full md:w-2/3 lg:w-1/2 p-4 bg-white border-2 border-blue-500 rounded-xl card-hover flex items-center transition-all hover:bg-blue-50 group">
                    <div class="bg-blue-100 text-blue-600 w-12 h-12 rounded-full flex items-center justify-center text-2xl mr-4 group-hover:bg-blue-500 group-hover:text-white transition-colors">
                        <i class="fas fa-sort-amount-down"></i>
                    </div>
                    <div class="text-left">
                        <h3 class="text-lg font-bold text-gray-800">第二模式：單人排序</h3>
                        <p class="text-sm text-gray-500">將選項依序排列，答對才可通關。</p>
                    </div>
                </button>


                <button onclick="showMode3Setup()" class="w-full md:w-2/3 lg:w-1/2 p-4 bg-white border-2 border-purple-500 rounded-xl card-hover flex items-center transition-all hover:bg-purple-50 group">
                    <div class="bg-purple-100 text-purple-600 w-12 h-12 rounded-full flex items-center justify-center text-2xl mr-4 group-hover:bg-purple-500 group-hover:text-white transition-colors">
                        <i class="fas fa-users"></i>
                    </div>
                    <div class="text-left">
                        <h3 class="text-lg font-bold text-gray-800">第三模式：派對接龍</h3>
                        <p class="text-sm text-gray-500">2~4人遊玩，輪流出牌排列時間線！</p>
                    </div>
                </button>
            </div>


            <!-- ================= VIEW: MODE 1 (MULTIPLE CHOICE) ================= -->
            <div id="view-mode1" class="hidden flex-grow flex flex-col fade-in">
                <div class="flex justify-between items-center mb-6">
                    <span class="bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full text-sm font-bold">目前得分: <span id="m1-score">0</span></span>
                    <span class="text-gray-500 text-sm">題數: <span id="m1-count">1</span></span>
                </div>
                
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex-grow flex flex-col justify-center">
                    <h3 class="text-center text-gray-500 text-sm mb-2 font-bold uppercase tracking-wide">選出世界之最</h3>
                    <h2 id="m1-question" class="text-2xl md:text-3xl font-bold text-center text-gray-800 mb-8">題目載入中...</h2>
                    
                    <div id="m1-options" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- Options injected here -->
                    </div>
                </div>
                <div class="mt-4 text-center hidden" id="m1-next-container">
                    <p id="m1-feedback" class="text-lg font-bold mb-2"></p>
                    <button onclick="generateMode1Question()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transform transition hover:scale-105">下一題 <i class="fas fa-arrow-right ml-2"></i></button>
                </div>
            </div>


            <!-- ================= VIEW: MODE 2 (SETUP) ================= -->
            <div id="view-mode2-setup" class="hidden flex-grow flex flex-col items-center justify-center fade-in">
                <h2 class="text-2xl font-bold mb-6 text-gray-800">單人排序 - 選擇難度</h2>
                <div class="flex flex-col space-y-4 w-full max-w-sm">
                    <button onclick="startMode2(3)" class="bg-green-100 hover:bg-green-200 text-green-800 font-bold py-4 rounded-xl border-2 border-green-400 transition-colors">
                        簡易 (排列前 3 名)
                    </button>
                    <button onclick="startMode2(4)" class="bg-yellow-100 hover:bg-yellow-200 text-yellow-800 font-bold py-4 rounded-xl border-2 border-yellow-400 transition-colors">
                        中等 (排列前 4 名)
                    </button>
                    <button onclick="startMode2(5)" class="bg-red-100 hover:bg-red-200 text-red-800 font-bold py-4 rounded-xl border-2 border-red-400 transition-colors">
                        高等 (排列前 5 名)
                    </button>
                </div>
            </div>


            <!-- ================= VIEW: MODE 2 (GAME) ================= -->
            <div id="view-mode2" class="hidden flex-grow flex flex-col fade-in">
                <div class="text-center mb-6">
                    <h3 class="text-sm font-bold text-gray-500 uppercase tracking-wide">排序挑戰</h3>
                    <h2 id="m2-category" class="text-xl md:text-2xl font-bold text-emerald-700">類別載入中...</h2>
                    <p class="text-gray-500 text-sm mt-1">請依 <span class="font-bold text-red-500">第一名到第<span id="m2-difficulty-text"></span>名</span> 順序排列</p>
                    <p id="m2-order-hint" class="text-sm mt-2 font-bold px-3 py-1 rounded-full inline-block"></p>
                </div>


                <!-- Target Slots (Where items go) -->
                <div class="mb-8">
                    <h4 class="text-sm font-bold text-gray-600 mb-2"><i class="fas fa-trophy text-yellow-500 mr-1"></i> 你的答案 (點擊可移出)</h4>
                    <div id="m2-slots" class="flex flex-col gap-2">
                        <!-- Slots injected here -->
                    </div>
                </div>


                <!-- Available Items -->
                <div class="flex-grow">
                    <h4 class="text-sm font-bold text-gray-600 mb-2"><i class="fas fa-hand-pointer text-blue-500 mr-1"></i> 備選項目 (點擊加入答案)</h4>
                    <div id="m2-available" class="flex flex-wrap gap-3 justify-center bg-gray-50 p-4 rounded-xl border border-gray-200 min-h-[120px]">
                        <!-- Items injected here -->
                    </div>
                </div>


                <div class="mt-6 text-center">
                    <button id="m2-submit-btn" onclick="checkMode2Answer()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-12 rounded-full shadow-lg opacity-50 cursor-not-allowed transition-all" disabled>
                        提交答案
                    </button>
                </div>
            </div>


            <!-- ================= VIEW: MODE 3 (SETUP) ================= -->
            <div id="view-mode3-setup" class="hidden flex-grow flex flex-col items-center justify-center fade-in">
                <h2 class="text-2xl font-bold mb-6 text-gray-800 text-center">派對接龍設定</h2>
                
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 w-full max-w-md space-y-6">
                    <div>
                        <label class="block text-gray-700 font-bold mb-2">遊玩人數:</label>
                        <div class="flex gap-2">
                            <button class="m3-player-btn flex-1 py-2 rounded border border-purple-500 bg-purple-500 text-white font-bold" data-val="2">2人</button>
                            <button class="m3-player-btn flex-1 py-2 rounded border border-purple-500 text-purple-500 font-bold hover:bg-purple-50" data-val="3">3人</button>
                            <button class="m3-player-btn flex-1 py-2 rounded border border-purple-500 text-purple-500 font-bold hover:bg-purple-50" data-val="4">4人</button>
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-gray-700 font-bold mb-2">遊戲局數:</label>
                        <div class="flex gap-2">
                            <button class="m3-round-btn flex-1 py-2 rounded border border-blue-500 bg-blue-500 text-white font-bold" data-val="4">小局 (4局)</button>
                            <button class="m3-round-btn flex-1 py-2 rounded border border-blue-500 text-blue-500 font-bold hover:bg-blue-50" data-val="8">中局 (8局)</button>
                            <button class="m3-round-btn flex-1 py-2 rounded border border-blue-500 text-blue-500 font-bold hover:bg-blue-50" data-val="12">大局 (12局)</button>
                        </div>
                    </div>


                    <button onclick="startMode3()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-xl shadow-lg mt-4 transition-transform hover:scale-105">
                        開始派對！ <i class="fas fa-play ml-2"></i>
                    </button>
                </div>
            </div>


            <!-- ================= VIEW: MODE 3 (GAME) ================= -->
            <div id="view-mode3" class="hidden flex-grow flex flex-col fade-in">
                
                <!-- Status Bar -->
                <div class="flex justify-between items-center mb-4 bg-white p-3 rounded-lg shadow-sm border border-gray-100">
                    <div class="text-sm font-bold text-gray-600">
                        回合: <span id="m3-round-display" class="text-purple-600 text-lg">1/4</span>
                    </div>
                    <div id="m3-player-turn" class="text-lg font-black text-white bg-purple-600 px-4 py-1 rounded-full shadow-md animate-pulse">
                        玩家 1 的回合
                    </div>
                </div>


                <!-- Score Board -->
                <div id="m3-scoreboard" class="flex justify-center gap-2 md:gap-4 mb-4 flex-wrap">
                    <!-- Scores injected here -->
                </div>


                <!-- Game Area -->
                <div class="bg-gray-50 border border-gray-200 rounded-xl p-4 flex-grow flex flex-col">
                    <div class="text-center mb-2">
                        <span class="text-xs font-bold text-gray-400 uppercase">目前分類</span>
                        <h2 id="m3-category" class="text-xl font-bold text-gray-800">類別載入中...</h2>
                    </div>


                    <!-- Timeline Board -->
                    <div class="flex-grow flex items-center justify-center py-8">
                        <div class="timeline-container w-full overflow-x-auto pb-4 flex items-center min-h-[160px] px-2 relative" id="m3-timeline">
                            <!-- Cards and Insert points injected here -->
                        </div>
                    </div>


                    <!-- Player Action Area -->
                    <div class="mt-auto border-t-2 border-dashed border-gray-300 pt-4 text-center">
                        <p class="text-sm text-gray-500 font-bold mb-2">你要出這張牌：</p>
                        <div class="inline-block bg-white border-2 border-purple-400 rounded-xl p-4 shadow-lg min-w-[200px]">
                            <h3 id="m3-current-card-name" class="text-xl font-bold text-purple-700">牌名</h3>
                            <p class="text-xs text-gray-400 mt-1">請點擊上方的 <span class="bg-green-100 text-green-700 px-1 rounded">+</span> 將它放入正確順序</p>
                        </div>
                    </div>
                </div>
            </div>


            <!-- Mode 3 Round Result Modal (Overlay) -->
            <div id="m3-modal" class="fixed inset-0 bg-black bg-opacity-60 z-40 hidden flex items-center justify-center backdrop-blur-sm fade-in">
                <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-md w-[90%] text-center">
                    <div id="m3-modal-icon" class="text-5xl mb-4"></div>
                    <h2 id="m3-modal-title" class="text-2xl font-bold mb-2">回合結束</h2>
                    <p id="m3-modal-desc" class="text-gray-600 mb-6">敘述...</p>
                    <div id="m3-modal-detail" class="text-left bg-gray-50 p-4 rounded-lg text-sm mb-6 max-h-40 overflow-y-auto hidden"></div>
                    <button onclick="m3NextRound()" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-8 rounded-full shadow-md w-full">
                        繼續遊戲
                    </button>
                </div>
            </div>


        </main>
    </div>


    <script>
        // ==========================================
        // 1. DATA (200 questions across 40 categories)
        // ==========================================
        // order: 'desc' means larger value is Rank 1. 'asc' means smaller value is Rank 1.
        // items array is ALWAYS ordered from Rank 1 (index 0) to Rank 5 (index 4).
        const DATABASE = [
            // Geography - Nature
            { cat: "世界最高山峰", unit: "公尺", order: "desc", items: [{n:"聖母峰", v:8848}, {n:"喬戈里峰(K2)", v:8611}, {n:"干城章嘉峰", v:8586}, {n:"洛子峰", v:8516}, {n:"馬卡魯峰", v:8485}] },
            { cat: "世界最長河流", unit: "公里", order: "desc", items: [{n:"尼羅河", v:6650}, {n:"亞馬遜河", v:6400}, {n:"長江", v:6300}, {n:"密西西比河", v:6275}, {n:"葉尼塞河", v:5539}] },
            { cat: "世界最大湖泊(面積)", unit: "萬平方公里", order: "desc", items: [{n:"裏海", v:37.1}, {n:"蘇必略湖", v:8.2}, {n:"維多利亞湖", v:6.8}, {n:"休倫湖", v:5.9}, {n:"密西根湖", v:5.8}] },
            { cat: "世界最深海溝(深度)", unit: "公尺", order: "desc", items: [{n:"馬里亞納海溝", v:10911}, {n:"東加海溝", v:10882}, {n:"菲律賓海溝", v:10540}, {n:"千島-堪察加海溝", v:10500}, {n:"克馬德克海溝", v:10047}] },
            { cat: "世界最大島嶼", unit: "萬平方公里", order: "desc", items: [{n:"格陵蘭島", v:216}, {n:"新幾內亞島", v:78.5}, {n:"婆羅洲", v:74.3}, {n:"馬達加斯加", v:58.7}, {n:"巴芬島", v:50.7}] },
            { cat: "世界最大沙漠", unit: "萬平方公里", order: "desc", items: [{n:"南極沙漠", v:1420}, {n:"北極沙漠", v:1398}, {n:"撒哈拉沙漠", v:920}, {n:"阿拉伯沙漠", v:233}, {n:"戈壁沙漠", v:129}] },
            { cat: "世界最大海洋", unit: "萬平方公里", order: "desc", items: [{n:"太平洋", v:16525}, {n:"大西洋", v:10646}, {n:"印度洋", v:7056}, {n:"南冰洋", v:2032}, {n:"北冰洋", v:1405}] },
            
            // Geography - Countries
            { cat: "世界面積最大國家", unit: "萬平方公里", order: "desc", items: [{n:"俄羅斯", v:1709}, {n:"加拿大", v:998}, {n:"中國", v:959}, {n:"美國", v:937}, {n:"巴西", v:851}] },
            { cat: "世界面積最小國家", unit: "平方公里", order: "asc", items: [{n:"梵蒂岡", v:0.44}, {n:"摩納哥", v:2.02}, {n:"諾魯", v:21}, {n:"吐瓦魯", v:26}, {n:"聖馬利諾", v:61}] },
            { cat: "世界人口最多國家(2023估)", unit: "億人", order: "desc", items: [{n:"印度", v:14.28}, {n:"中國", v:14.25}, {n:"美國", v:3.39}, {n:"印尼", v:2.77}, {n:"巴基斯坦", v:2.4}] },
            { cat: "世界人口密度最高國家/地區", unit: "人/平方公里", order: "desc", items: [{n:"澳門", v:21000}, {n:"摩納哥", v:19000}, {n:"新加坡", v:8000}, {n:"香港", v:6800}, {n:"直布羅陀", v:3300}] },
            { cat: "海岸線最長國家", unit: "萬公里", order: "desc", items: [{n:"加拿大", v:20.2}, {n:"印尼", v:5.4}, {n:"格陵蘭(丹麥)", v:4.4}, {n:"俄羅斯", v:3.7}, {n:"菲律賓", v:3.6}] },
            
            // Biology / Animals
            { cat: "陸地最快動物(時速)", unit: "公里/小時", order: "desc", items: [{n:"獵豹", v:120}, {n:"叉角羚", v:88}, {n:"跳羚", v:88}, {n:"格雷伊獵犬", v:74}, {n:"非洲野犬", v:71}] },

        // Utility: Shuffle Array
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }


        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `fixed top-5 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-lg transition-all duration-300 z-50 text-center font-bold ${isError ? 'bg-red-500 text-white' : 'bg-emerald-500 text-white'}`;
            t.style.opacity = '1';
            t.style.transform = 'translate(-50%, 0)';
            setTimeout(() => {
                t.style.opacity = '0';
                t.style.transform = 'translate(-50%, -20px)';
            }, 2000);
        }


        // ==========================================
        // 1. MODE 1: Multiple Choice
        // ==========================================
        let m1Score = 0;
        let m1Count = 1;
        let m1CorrectAnswer = "";


        function initMode1() {
            m1Score = 0;
            m1Count = 1;
            updateM1UI();
            generateMode1Question();
        }


        function updateM1UI() {
            document.getElementById('m1-score').textContent = m1Score;
            document.getElementById('m1-count').textContent = m1Count;
        }


        function generateMode1Question() {
            document.getElementById('m1-next-container').classList.add('hidden');
            
            // Pick random category
            const catObj = DATABASE[Math.floor(Math.random() * DATABASE.length)];
            const correctItem = catObj.items[0]; // Always rank 1
            m1CorrectAnswer = correctItem.n;


            // Generate distractors
            let options = [correctItem];
            let allOtherItems = [];
            
            // Try to get distractors from same category first for harder difficulty
            catObj.items.slice(1).forEach(i => allOtherItems.push(i));
            
            // If not enough, get from others (though we always have 4 more)
            // Just shuffle the remaining 4 items from the same category to use as distractors
            let distractors = shuffle(catObj.items.slice(1)).slice(0, 3);
            options = options.concat(distractors);
            options = shuffle(options);


            document.getElementById('m1-question').innerHTML = `哪一個是<br><span class="text-emerald-600">『${catObj.cat}』</span>的第一名？`;
            
            const optionsContainer = document.getElementById('m1-options');
            optionsContainer.innerHTML = '';
            
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'w-full bg-white hover:bg-emerald-50 border-2 border-gray-200 hover:border-emerald-500 text-gray-700 font-bold py-4 px-6 rounded-xl transition-all shadow-sm';
                btn.textContent = opt.n;
                btn.onclick = () => checkM1Answer(btn, opt.n, catObj.items[0]);
                optionsContainer.appendChild(btn);
            });
        }


        function checkM1Answer(btn, selected, correctData) {
            // Disable all buttons
            const buttons = document.getElementById('m1-options').querySelectorAll('button');
            buttons.forEach(b => {
                b.onclick = null;
                b.classList.remove('hover:bg-emerald-50', 'hover:border-emerald-500', 'cursor-pointer');
                if (b.textContent === m1CorrectAnswer) {
                    b.classList.add('bg-green-500', 'text-white', 'border-green-600');
                } else {
                    b.classList.add('opacity-50');
                }
            });


            const fb = document.getElementById('m1-feedback');
            if (selected === m1CorrectAnswer) {
                m1Score++;
                btn.classList.add('bg-green-500', 'text-white', 'border-green-600');
                btn.classList.remove('opacity-50');
                fb.innerHTML = `<span class="text-green-500"><i class="fas fa-check-circle"></i> 答對了！</span> 數據: ${correctData.v} ${DATABASE.find(d=>d.cat.includes(correctData.n) || true).unit}`; // simplification for unit
                playSFX('correct');
            } else {
                btn.classList.add('bg-red-500', 'text-white', 'border-red-600');
                btn.classList.remove('opacity-50');
                fb.innerHTML = `<span class="text-red-500"><i class="fas fa-times-circle"></i> 答錯了！</span> 第一名是 ${m1CorrectAnswer}`;
                playSFX('wrong');
            }


            m1Count++;
            updateM1UI();
            document.getElementById('m1-next-container').classList.remove('hidden');
        }


        // ==========================================
        // 2. MODE 2: Sorting (1 Player)
        // ==========================================
        function showMode2Setup() {
            hideAllViews();
            document.getElementById('view-mode2-setup').classList.remove('hidden');
        }


        let m2Difficulty = 3;
        let m2CurrentCat = null;
        let m2SelectedItems = []; // Items currently in slots
        let m2AvailableItems = []; // Items available to pick
        let m2AllItemsData = []; // Store original data to verify


        function startMode2(diff) {
            m2Difficulty = diff;
            hideAllViews();
            AudioSystem.play('game');
            document.getElementById('view-mode2').classList.remove('hidden');
            document.getElementById('m2-difficulty-text').textContent = diff;
            generateMode2Level();
        }


        function generateMode2Level() {
            m2CurrentCat = DATABASE[Math.floor(Math.random() * DATABASE.length)];
            document.getElementById('m2-category').textContent = m2CurrentCat.cat;
            
            // Show order direction hint
            const hintEl = document.getElementById('m2-order-hint');
            if (m2CurrentCat.order === 'asc') {
                hintEl.textContent = `📈 數值由小到大（${m2CurrentCat.unit}越少排越前）`;
                hintEl.className = 'text-sm mt-2 font-bold px-3 py-1 rounded-full inline-block bg-blue-100 text-blue-700';
            } else {
                hintEl.textContent = `📉 數值由大到小（${m2CurrentCat.unit}越多排越前）`;
                hintEl.className = 'text-sm mt-2 font-bold px-3 py-1 rounded-full inline-block bg-orange-100 text-orange-700';
            }
            
            // Get top N items
            m2AllItemsData = m2CurrentCat.items.slice(0, m2Difficulty).map((item, index) => ({...item, originalRank: index}));
            
            // Shuffle for available pool
            m2AvailableItems = shuffle([...m2AllItemsData]);
            m2SelectedItems = new Array(m2Difficulty).fill(null);
            
            renderM2UI();
        }


        function renderM2UI() {
            const slotsContainer = document.getElementById('m2-slots');
            slotsContainer.innerHTML = '';
            
            // Render Slots
            for (let i = 0; i < m2Difficulty; i++) {
                const slotDiv = document.createElement('div');
                slotDiv.className = 'w-full bg-white border-2 border-dashed border-gray-300 rounded-lg p-3 min-h-[60px] flex items-center justify-between cursor-pointer transition-colors hover:bg-gray-50';
                
                const rankBadge = document.createElement('span');
                rankBadge.className = `font-black text-xl w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 ${i<3 ? 'rank-medal-'+i : 'text-gray-400'}`;
                rankBadge.textContent = i + 1;
                
                const contentDiv = document.createElement('div');
                contentDiv.className = 'flex-grow px-4 font-bold text-gray-800 text-lg';
                
                if (m2SelectedItems[i]) {
                    slotDiv.classList.remove('border-dashed', 'border-gray-300');
                    slotDiv.classList.add('border-solid', 'border-blue-400', 'bg-blue-50', 'shadow-sm');
                    contentDiv.textContent = m2SelectedItems[i].n;
                    slotDiv.onclick = () => returnM2Item(i);
                } else {
                    contentDiv.textContent = '...';
                    contentDiv.classList.add('text-gray-300');
                }
                
                slotDiv.prepend(rankBadge);
                slotsContainer.appendChild(slotDiv);
            }


            // Render Available
            const availContainer = document.getElementById('m2-available');
            availContainer.innerHTML = '';
            m2AvailableItems.forEach((item, index) => {
                const btn = document.createElement('button');
                btn.className = 'bg-white border border-gray-300 shadow-sm hover:border-blue-500 hover:text-blue-600 font-bold py-2 px-4 rounded-lg transition-all card-hover';
                btn.textContent = item.n;
                btn.onclick = () => selectM2Item(index);
                availContainer.appendChild(btn);
            });


            // Update submit button
            const submitBtn = document.getElementById('m2-submit-btn');
            if (m2SelectedItems.every(i => i !== null)) {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                submitBtn.classList.add('animate-pulse');
            } else {
                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
                submitBtn.classList.remove('animate-pulse');
            }
        }


        function selectM2Item(availIndex) {
            const emptySlotIndex = m2SelectedItems.findIndex(i => i === null);
            if (emptySlotIndex !== -1) {
                const item = m2AvailableItems.splice(availIndex, 1)[0];
                m2SelectedItems[emptySlotIndex] = item;
                renderM2UI();
            }
        }


        function returnM2Item(slotIndex) {
            const item = m2SelectedItems[slotIndex];
            if (item) {
                m2SelectedItems[slotIndex] = null;
                m2AvailableItems.push(item);
                renderM2UI();
            }
        }


        function checkMode2Answer() {
            let isCorrect = true;
            for (let i = 0; i < m2Difficulty; i++) {
                if (m2SelectedItems[i].originalRank !== i) {
                    isCorrect = false;
                    break;
                }
            }


            if (isCorrect) {
                showToast("正確無誤！進入下一關！");
                playSFX('correct');
                setTimeout(generateMode2Level, 1000);
            } else {
                showToast("順序有誤，請再試一次", true);
                playSFX('wrong');
                // Reset slots visual error optionally, for now just clear them
                m2AvailableItems = [...m2AvailableItems, ...m2SelectedItems.filter(i=>i!==null)];
                m2SelectedItems = new Array(m2Difficulty).fill(null);
                renderM2UI();
            }
        }


        // ==========================================
        // 3. MODE 3: Party Timeline
        // ==========================================
        let m3Config = { players: 2, roundsTotal: 4 };
        let m3State = {
            round: 1,
            scores: [], // Total scores
            currentPlayer: 0, // 0 to config.players - 1
            catData: null, // Current category
            board: [], // Array of items currently on board {n, v, originalRank}
            unplacedItems: [], // Items remaining to be placed
            currentCard: null // Item the current player must place
        };


        const m3Colors = ['bg-red-500', 'bg-blue-500', 'bg-green-500', 'bg-yellow-500'];


        function showMode3Setup() {
            hideAllViews();
            document.getElementById('view-mode3-setup').classList.remove('hidden');
            
            // Setup toggle buttons
            document.querySelectorAll('.m3-player-btn').forEach(btn => {
                btn.onclick = (e) => {
                    document.querySelectorAll('.m3-player-btn').forEach(b => {
                        b.classList.remove('bg-purple-500', 'text-white');
                        b.classList.add('text-purple-500', 'hover:bg-purple-50');
                    });
                    e.target.classList.add('bg-purple-500', 'text-white');
                    e.target.classList.remove('text-purple-500', 'hover:bg-purple-50');
                    m3Config.players = parseInt(e.target.dataset.val);
                }
            });


            document.querySelectorAll('.m3-round-btn').forEach(btn => {
                btn.onclick = (e) => {
                    document.querySelectorAll('.m3-round-btn').forEach(b => {
                        b.classList.remove('bg-blue-500', 'text-white');
                        b.classList.add('text-blue-500', 'hover:bg-blue-50');
                    });
                    e.target.classList.add('bg-blue-500', 'text-white');
                    e.target.classList.remove('text-blue-500', 'hover:bg-blue-50');
                    m3Config.roundsTotal = parseInt(e.target.dataset.val);
                }
            });
        }


        function startMode3() {
            m3State.scores = new Array(m3Config.players).fill(0);
            m3State.round = 1;
            m3State.currentPlayer = 0; // P1 starts
            
            hideAllViews();
            AudioSystem.play('game');
            document.getElementById('view-mode3').classList.remove('hidden');
            
            startM3Round();
        }


        function startM3Round() {
            if (m3State.round > m3Config.roundsTotal) {
                // Game Over
                endM3Game();
                return;
            }


            // Pick a random category that hasn't been used recently (simplified: just random)
            m3State.catData = DATABASE[Math.floor(Math.random() * DATABASE.length)];
            
            // Prepare items with their absolute rank
            let items = m3State.catData.items.map((item, idx) => ({...item, originalRank: idx}));
            
            // Shuffle them
            m3State.unplacedItems = shuffle([...items]);
            
            // Place the first one on the board
            m3State.board = [m3State.unplacedItems.pop()];
            
            // Draw card for current player
            m3State.currentCard = m3State.unplacedItems.pop();


            updateM3UI();
        }


        function updateM3UI() {
            document.getElementById('m3-round-display').textContent = `${m3State.round}/${m3Config.roundsTotal}`;
            
            const turnIndicator = document.getElementById('m3-player-turn');
            turnIndicator.textContent = `玩家 ${m3State.currentPlayer + 1} 的回合`;
            turnIndicator.className = `text-lg font-black text-white px-4 py-1 rounded-full shadow-md animate-pulse ${m3Colors[m3State.currentPlayer]}`;


            // Scoreboard
            const sb = document.getElementById('m3-scoreboard');
            sb.innerHTML = '';
            for(let i=0; i<m3Config.players; i++) {
                const isTurn = i === m3State.currentPlayer;
                sb.innerHTML += `
                    <div class="px-4 py-2 rounded-lg border-2 ${isTurn ? 'border-gray-800 shadow-md' : 'border-transparent opacity-70'} flex flex-col items-center">
                        <span class="text-xs font-bold text-gray-500">P${i+1}</span>
                        <span class="text-xl font-black ${m3Colors[i].replace('bg-', 'text-')}">${m3State.scores[i]}</span>
                    </div>
                `;
            }


            // Category & Card
            document.getElementById('m3-category').textContent = `${m3State.catData.cat} (${m3State.catData.unit})`;
            document.getElementById('m3-current-card-name').textContent = m3State.currentCard.n;


            renderM3Timeline();
        }


        function renderM3Timeline() {
            const tl = document.getElementById('m3-timeline');
            tl.innerHTML = '';


            const unit = m3State.catData.unit;


            // Render logic: Insert Button [0], Card [0], Insert Button [1], Card [1] ... Insert Button [N]
            for (let i = 0; i <= m3State.board.length; i++) {
                // Insert point
                const btn = document.createElement('button');
                btn.className = 'w-10 h-10 md:w-12 md:h-12 rounded-full border-2 border-dashed border-purple-400 text-purple-400 flex-shrink-0 flex items-center justify-center hover:bg-purple-100 hover:text-purple-600 hover:border-solid transition-all mx-1 z-10 bg-white';
                btn.innerHTML = '<i class="fas fa-plus"></i>';
                btn.onclick = () => attemptM3Placement(i);
                tl.appendChild(btn);


                // Card
                if (i < m3State.board.length) {
                    const cardData = m3State.board[i];
                    const card = document.createElement('div');
                    card.className = 'w-32 md:w-40 bg-white border border-gray-200 rounded-xl shadow-md p-3 flex-shrink-0 flex flex-col items-center justify-center relative mx-1';
                    
                    // Show correct rank slightly hidden or clearly? Let's show data.
                    card.innerHTML = `
                        <div class="text-xs text-gray-400 mb-1 absolute top-1 left-2">#${cardData.originalRank + 1}</div>
                        <h4 class="font-bold text-gray-800 text-center mb-1 leading-tight mt-3">${cardData.n}</h4>
                        <span class="text-sm font-black text-emerald-600">${cardData.v}</span>
                    `;
                    tl.appendChild(card);
                }
            }
        }


        function attemptM3Placement(insertIndex) {
            // Check if valid
            // Board is ALWAYS sorted according to the category order (which maps to originalRank 0 to 4 ascending).
            // So board is sorted by originalRank ascending. (0 is #1, left-most)
            
            let isCorrect = true;
            
            // Card to left
            if (insertIndex > 0) {
                const leftCard = m3State.board[insertIndex - 1];
                if (m3State.currentCard.originalRank < leftCard.originalRank) {
                    isCorrect = false; // Current card should be rank 1 (smaller index) than left card, but we placed it to the right.
                }
            }
            
            // Card to right
            if (insertIndex < m3State.board.length) {
                const rightCard = m3State.board[insertIndex];
                if (m3State.currentCard.originalRank > rightCard.originalRank) {
                    isCorrect = false; // Current card should be rank 5 (larger index) than right card, but we placed it to the left.
                }
            }


            if (isCorrect) {
                // Success!
                m3State.scores[m3State.currentPlayer] += 1;
                
                // Insert card into board array
                m3State.board.splice(insertIndex, 0, m3State.currentCard);
                
                if (m3State.unplacedItems.length > 0) {
                    // Next player's turn in same round
                    m3State.currentPlayer = (m3State.currentPlayer + 1) % m3Config.players;
                    m3State.currentCard = m3State.unplacedItems.pop();
                    updateM3UI();
                    showToast("接續成功！+1分");
                    playSFX('correct');
                } else {
                    // Round finished perfectly
                    playSFX('win');
                    showM3Modal(true, "完美！回合結束", `所有項目都排列正確！玩家 ${m3State.currentPlayer + 1} 完美收尾。`);
                }
            } else {
                playSFX('wrong');
                // Fail!
                // Player gets 0 for this ROUND. Since we add directly to total, we need to subtract what they earned this round?
                // Wait, rule: "如果當局接錯的人該局分數則0分". 
                // Let's implement simpler: If wrong, you lose 1 point (or get 0 total). 
                // Let's go with rule discussed: +1 for correct. Wrong = round ends, you get nothing this turn. 
                // To punish strictly: They lose all points they gained THIS ROUND.
                // Since that requires tracking round scores separately, let's just do: Mistake = 0 points for this action, Round Ends immediately.
                // Next round starts with them.
                
                showM3Modal(false, `玩家 ${m3State.currentPlayer + 1} 失敗！`, `排列錯誤！<br><span class="font-bold text-red-500">${m3State.currentCard.n}</span> 的數據是 ${m3State.currentCard.v}，真正的排名是第 ${m3State.currentCard.originalRank + 1} 名。`);
            }
        }


        function showM3Modal(isSuccess, title, desc) {
            const modal = document.getElementById('m3-modal');
            const icon = document.getElementById('m3-modal-icon');
            document.getElementById('m3-modal-title').textContent = title;
            document.getElementById('m3-modal-desc').innerHTML = desc;
            
            if(isSuccess) {
                icon.innerHTML = '<i class="fas fa-star text-yellow-400"></i>';
                document.getElementById('m3-modal-title').className = "text-2xl font-bold mb-2 text-green-600";
            } else {
                icon.innerHTML = '<i class="fas fa-bomb text-red-500"></i>';
                document.getElementById('m3-modal-title').className = "text-2xl font-bold mb-2 text-red-600";
                
                // Show correct order
                const detail = document.getElementById('m3-modal-detail');
                detail.classList.remove('hidden');
                let detailHtml = '<div class="font-bold mb-1">正確順序：</div><ol class="list-decimal pl-5">';
                m3State.catData.items.forEach((it, idx) => {
                    detailHtml += `<li class="${it.n === m3State.currentCard.n ? 'text-red-500 font-bold' : ''}">${it.n} (${it.v})</li>`;
                });
                detailHtml += '</ol>';
                detail.innerHTML = detailHtml;
            }


            modal.classList.remove('hidden');
        }


        function m3NextRound() {
            document.getElementById('m3-modal').classList.add('hidden');
            document.getElementById('m3-modal-detail').classList.add('hidden');
            
            m3State.round++;
            startM3Round();
        }


        // ==========================================
        // AUDIO SYSTEM
        // ==========================================
        const AudioSystem = (() => {
            // Web Audio Context
            let ctx = null;
            let masterGain = null;
            let currentSource = null;
            let currentTrack = null;
            let isMuted = false;
            let volume = 0.5;

            // Music definitions using Web Audio API synthesis
            // Lobby: upbeat, bright, quiz-show feel
            // Game: faster, tenser

            function getCtx() {
                if (!ctx) {
                    ctx = new (window.AudioContext || window.webkitAudioContext)();
                    masterGain = ctx.createGain();
                    masterGain.gain.setValueAtTime(volume, ctx.currentTime);
                    masterGain.connect(ctx.destination);
                }
                return ctx;
            }

            // Synthesize a simple melodic loop
            function createLobbyLoop() {
                const c = getCtx();
                // Bright, major-key quiz show melody
                // Notes: C D E G A pattern in loop
                const notes = [
                    // Melody notes [freq, start, duration]
                    [523.25, 0.0, 0.4], [587.33, 0.4, 0.2], [659.25, 0.6, 0.4],
                    [783.99, 1.0, 0.3], [880.00, 1.3, 0.3], [783.99, 1.6, 0.4],
                    [659.25, 2.0, 0.3], [587.33, 2.3, 0.2], [523.25, 2.5, 0.5],
                    [392.00, 3.0, 0.3], [440.00, 3.3, 0.2], [523.25, 3.5, 0.4],
                    [587.33, 3.9, 0.2], [659.25, 4.1, 0.3], [783.99, 4.4, 0.5],
                    [659.25, 4.9, 0.3], [587.33, 5.2, 0.2], [523.25, 5.4, 0.6],
                ];
                // Bass
                const bass = [
                    [130.81, 0.0, 0.8], [146.83, 0.8, 0.8], [164.81, 1.6, 0.8],
                    [130.81, 2.4, 0.8], [146.83, 3.2, 0.8], [164.81, 4.0, 0.8],
                    [130.81, 4.8, 0.8], [146.83, 5.4, 0.6],
                ];
                return { notes, bass, duration: 6.0, type: 'lobby' };
            }

            function createGameLoop() {
                const c = getCtx();
                // Faster, more tense puzzle-game feel
                const notes = [
                    [659.25, 0.0, 0.25], [783.99, 0.25, 0.25], [880.00, 0.5, 0.25],
                    [1046.5, 0.75, 0.25], [880.00, 1.0, 0.25], [783.99, 1.25, 0.25],
                    [659.25, 1.5, 0.5],   [587.33, 2.0, 0.25], [523.25, 2.25, 0.25],
                    [587.33, 2.5, 0.25],  [659.25, 2.75, 0.25],[783.99, 3.0, 0.25],
                    [880.00, 3.25, 0.25], [783.99, 3.5, 0.25], [659.25, 3.75, 0.25],
                    [587.33, 4.0, 0.5],   [523.25, 4.5, 0.25], [587.33, 4.75, 0.25],
                    [659.25, 5.0, 0.5],
                ];
                const bass = [
                    [196.00, 0.0, 0.5], [220.00, 0.5, 0.5], [246.94, 1.0, 0.5],
                    [196.00, 1.5, 0.5], [220.00, 2.0, 0.5], [196.00, 2.5, 0.5],
                    [220.00, 3.0, 0.5], [246.94, 3.5, 0.5], [196.00, 4.0, 0.5],
                    [220.00, 4.5, 0.5], [196.00, 5.0, 0.5],
                ];
                return { notes, bass, duration: 5.5, type: 'game' };
            }

            function playNote(freq, startTime, duration, gainNode, type = 'sine', isBase = false) {
                const c = getCtx();
                const osc = c.createOscillator();
                const noteGain = c.createGain();

                osc.type = type;
                osc.frequency.setValueAtTime(freq, startTime);

                const vel = isBase ? 0.12 : 0.18;
                noteGain.gain.setValueAtTime(0, startTime);
                noteGain.gain.linearRampToValueAtTime(vel, startTime + 0.02);
                noteGain.gain.linearRampToValueAtTime(vel * 0.7, startTime + duration * 0.5);
                noteGain.gain.linearRampToValueAtTime(0, startTime + duration);

                osc.connect(noteGain);
                noteGain.connect(gainNode);
                osc.start(startTime);
                osc.stop(startTime + duration + 0.05);
                return osc;
            }

            function scheduleLoop(trackDef, startTime, gainNode, times = 0) {
                const c = getCtx();
                if (times > 999) return; // safety

                trackDef.notes.forEach(([freq, s, d]) => {
                    playNote(freq, startTime + s, d, gainNode, 'triangle');
                });
                trackDef.bass.forEach(([freq, s, d]) => {
                    playNote(freq, startTime + s, d, gainNode, 'sine', true);
                });

                // Schedule next loop slightly before this one ends
                const scheduleNext = startTime + trackDef.duration - 0.05;
                const delay = (scheduleNext - c.currentTime) * 1000;
                
                // Store timeout so we can cancel
                const tid = setTimeout(() => {
                    if (currentTrack === trackDef.type) {
                        scheduleLoop(trackDef, startTime + trackDef.duration, gainNode, times + 1);
                    }
                }, Math.max(0, delay));
            }

            function play(trackType) {
                if (currentTrack === trackType) return;
                stop();

                const c = getCtx();
                if (c.state === 'suspended') c.resume();

                currentTrack = trackType;
                const trackDef = trackType === 'lobby' ? createLobbyLoop() : createGameLoop();

                const trackGain = c.createGain();
                trackGain.gain.setValueAtTime(0, c.currentTime);
                trackGain.gain.linearRampToValueAtTime(1, c.currentTime + 0.5);
                trackGain.connect(masterGain);

                scheduleLoop(trackDef, c.currentTime, trackGain);

                // Update label
                const label = document.getElementById('music-label');
                if (label) {
                    label.textContent = trackType === 'lobby' ? '🎵 大廳音樂' : '🎮 遊戲音樂';
                }

                currentSource = trackGain;
            }

            function stop() {
                currentTrack = null;
                if (currentSource) {
                    try {
                        const c = getCtx();
                        currentSource.gain.linearRampToValueAtTime(0, c.currentTime + 0.3);
                    } catch(e) {}
                    currentSource = null;
                }
            }

            function setVolume(v) {
                volume = parseFloat(v);
                if (masterGain) {
                    masterGain.gain.setValueAtTime(isMuted ? 0 : volume, getCtx().currentTime);
                }
                updateVolIcon();
            }

            function toggleMute() {
                isMuted = !isMuted;
                if (masterGain) {
                    masterGain.gain.setValueAtTime(isMuted ? 0 : volume, getCtx().currentTime);
                }
                updateVolIcon();
            }

            function updateVolIcon() {
                const icon = document.getElementById('vol-icon');
                const label = document.getElementById('music-label');
                if (!icon) return;
                if (isMuted || volume === 0) {
                    icon.className = 'fas fa-volume-mute';
                    if (label) label.style.opacity = '0.4';
                } else if (volume < 0.4) {
                    icon.className = 'fas fa-volume-down';
                    if (label) label.style.opacity = '1';
                } else {
                    icon.className = 'fas fa-volume-up';
                    if (label) label.style.opacity = '1';
                }
            }

            function getMuted() { return isMuted; }

            return { play, stop, setVolume, toggleMute, getMuted, getCtx };
        })();

        // Sound Effects
        function playSFX(type) {
            try {
                const c = AudioSystem.getCtx();
                if (c.state === 'suspended') c.resume();
                const gain = c.createGain();
                gain.connect(c.destination);

                if (type === 'correct') {
                    // Rising chime ✓
                    [[523.25, 0, 0.08], [659.25, 0.08, 0.08], [783.99, 0.16, 0.12], [1046.5, 0.28, 0.2]].forEach(([f, s, d]) => {
                        const o = c.createOscillator();
                        const g = c.createGain();
                        o.type = 'sine';
                        o.frequency.value = f;
                        g.gain.setValueAtTime(0.25, c.currentTime + s);
                        g.gain.linearRampToValueAtTime(0, c.currentTime + s + d);
                        o.connect(g); g.connect(gain);
                        o.start(c.currentTime + s);
                        o.stop(c.currentTime + s + d + 0.05);
                    });
                } else if (type === 'wrong') {
                    // Descending buzz ✗
                    [[300, 0, 0.1], [220, 0.1, 0.1], [180, 0.2, 0.15]].forEach(([f, s, d]) => {
                        const o = c.createOscillator();
                        const g = c.createGain();
                        o.type = 'sawtooth';
                        o.frequency.value = f;
                        g.gain.setValueAtTime(0.2, c.currentTime + s);
                        g.gain.linearRampToValueAtTime(0, c.currentTime + s + d);
                        o.connect(g); g.connect(gain);
                        o.start(c.currentTime + s);
                        o.stop(c.currentTime + s + d + 0.05);
                    });
                } else if (type === 'click') {
                    const o = c.createOscillator();
                    const g = c.createGain();
                    o.type = 'sine';
                    o.frequency.value = 880;
                    g.gain.setValueAtTime(0.1, c.currentTime);
                    g.gain.linearRampToValueAtTime(0, c.currentTime + 0.06);
                    o.connect(g); g.connect(gain);
                    o.start(c.currentTime);
                    o.stop(c.currentTime + 0.08);
                } else if (type === 'win') {
                    // Fanfare
                    [[523.25,0,0.15],[659.25,0.15,0.15],[783.99,0.3,0.15],[1046.5,0.45,0.3],[783.99,0.75,0.15],[1046.5,0.9,0.4]].forEach(([f,s,d]) => {
                        const o = c.createOscillator();
                        const g = c.createGain();
                        o.type = 'triangle';
                        o.frequency.value = f;
                        g.gain.setValueAtTime(0.28, c.currentTime + s);
                        g.gain.linearRampToValueAtTime(0, c.currentTime + s + d);
                        o.connect(g); g.connect(gain);
                        o.start(c.currentTime + s);
                        o.stop(c.currentTime + s + d + 0.05);
                    });
                }
            } catch(e) {}
        }

        // Global audio control functions
        function setVolume(v) { AudioSystem.setVolume(v); }
        function toggleMute() { AudioSystem.toggleMute(); }

        // Fullscreen
        function toggleFullscreen() {
            const icon = document.getElementById('fs-icon');
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
                if (icon) { icon.className = 'fas fa-compress'; }
            } else {
                document.exitFullscreen().catch(() => {});
                if (icon) { icon.className = 'fas fa-expand'; }
            }
        }
        document.addEventListener('fullscreenchange', () => {
            const icon = document.getElementById('fs-icon');
            if (icon) {
                icon.className = document.fullscreenElement ? 'fas fa-compress' : 'fas fa-expand';
            }
        });

        // Auto-start on page load (requires user interaction; use click-to-start unlock)
        function unlockAndStart() {
            AudioSystem.getCtx(); // Resume context
            AudioSystem.play('lobby');
        }

        // Try auto-play immediately, fallback to first interaction
        window.addEventListener('load', () => {
            // Try auto fullscreen
            try { document.documentElement.requestFullscreen(); } catch(e) {}

            // Try auto audio
            try {
                AudioSystem.getCtx();
                AudioSystem.play('lobby');
            } catch(e) {
                // Will unlock on first click
            }

            // Unlock audio on first user interaction (browser policy)
            const unlock = () => {
                unlockAndStart();
                document.removeEventListener('click', unlock);
                document.removeEventListener('keydown', unlock);
                document.removeEventListener('touchstart', unlock);
            };
            document.addEventListener('click', unlock);
            document.addEventListener('keydown', unlock);
            document.addEventListener('touchstart', unlock);
        });

        // ==========================================
        // MUSIC TRACK SWITCHING
        // ==========================================
        function endM3Game() {
            const modal = document.getElementById('m3-modal');
            const icon = document.getElementById('m3-modal-icon');
            
            playSFX('win');
            AudioSystem.play('lobby'); // Return to lobby music on game end
            
            let maxScore = -1;
            let winners = [];
            m3State.scores.forEach((s, i) => {
                if (s > maxScore) { maxScore = s; winners = [i+1]; }
                else if (s === maxScore) { winners.push(i+1); }
            });


            icon.innerHTML = '<i class="fas fa-trophy text-yellow-500"></i>';
            document.getElementById('m3-modal-title').textContent = "遊戲結束！";
            document.getElementById('m3-modal-title').className = "text-2xl font-bold mb-2 text-yellow-600";
            
            let resultHtml = `<div class="text-xl mb-4">🏆 獲勝者: 玩家 ${winners.join(', ')} 🏆</div>`;
            resultHtml += `<div class="flex justify-center gap-4">`;
            m3State.scores.forEach((s, i) => {
                resultHtml += `<div class="text-center"><div class="font-bold text-gray-500">P${i+1}</div><div class="text-2xl">${s}分</div></div>`;
            });
            resultHtml += `</div>`;
            
            document.getElementById('m3-modal-desc').innerHTML = resultHtml;
            
            const btn = modal.querySelector('button');
            btn.textContent = "返回主選單";
            btn.onclick = () => {
                modal.classList.add('hidden');
                btn.onclick = m3NextRound; // reset
                btn.textContent = "繼續遊戲";
                showHome();
            };
            
            modal.classList.remove('hidden');
        }


    </script>
